  <!-- Material Symbols Rounded (可变字体，支持 FILL/wght/GRAD/opsz 轴) -->

  <!--
    Google Sans — M3 官方字体（直接引用 v69 woff2，非 Google Fonts API）
    Google Fonts API 返回的字体文件 GRAD 轴响应极弱，M3 使用专门的编译版本
    来源: https://m3.material.io/blog 内联 @font-face 声明
  -->

    /* Google Sans v69 — Greek, Cyrillic, etc. */
    @font-face{font-family:'Google Sans';font-style:normal;font-weight:400;font-display:block;src:url(https://fonts.gstatic.com/s/googlesans/v69/4UaRrENHsxJlGDuGo1OIlJfC6mGS6vhAK1YobMu2rcCIhM907-0x.woff2) format('woff2');unicode-range:U+0370-0377,U+037A-037F,U+0384-038A,U+038C,U+038E-03A1,U+03A3-03FF,U+0400-052F,U+1C80-1C88,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F}
    /* Google Sans v69 — Vietnamese, CJK punctuation */
    @font-face{font-family:'Google Sans';font-style:normal;font-weight:400;font-display:block;src:url(https://fonts.gstatic.com/s/googlesans/v69/4UaRrENHsxJlGDuGo1OIlJfC6mGS6vhAK1YobMu2rsCIhM907-0x.woff2) format('woff2');unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0333,U+1EA0-1EF9,U+20AB}
